<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;}
body{background:#07090e;color:#c8d6ef;font-family:'Manrope',sans-serif;font-size:13px;
  overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:#1c2336;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer;background:currentColor;box-shadow:0 0 0 3px rgba(0,0,0,.4);}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
select{outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;}
input:focus,select:focus,button:focus{outline:1px solid #5ba8ff;outline-offset:2px;}
button{font-family:'Manrope',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent;}
button:disabled{cursor:not-allowed;opacity:.45;}
button:active:not(:disabled){opacity:0.6;transform:scale(0.97);}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#1c2336;border-radius:2px;}

/* Install banner */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:linear-gradient(135deg,#0d1018,#111520);
  border-top:1px solid #1c2336;padding:14px 16px;
  align-items:center;gap:12px;animation:slideUp .3s ease;}
#install-banner.show{display:flex;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>

<!-- Install Banner -->
<div id="install-banner">
  <div style="font-size:22px">⬡</div>
  <div style="flex:1">
    <div style="font-weight:800;font-size:13px;color:#c8d6ef">Cursor Calc installieren</div>
    <div style="font-size:11px;color:#5a6a85;font-family:'IBM Plex Mono',monospace">Am Homescreen hinzufügen</div>
  </div>
  <button id="install-btn" style="background:#00d4aa22;border:1px solid #00d4aa;border-radius:8px;
    color:#00d4aa;font-weight:700;font-size:13px;padding:8px 16px;">Installieren</button>
  <button id="dismiss-btn" aria-label="Installationshinweis schließen" style="background:none;border:none;color:#5a6a85;font-size:20px;padding:4px 8px;">✕</button>
</div>

<script>
// PWA Install Prompt
let deferredPrompt;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.classList.add('show');
});
installBtn.addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('show');
});
dismissBtn.addEventListener('click', () => banner.classList.remove('show'));
window.addEventListener('appinstalled', () => banner.classList.remove('show'));
</script>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

const C = {
  bg:"#07090e", s1:"#0d1018", s2:"#111520", s3:"#161c2a",
  border:"#1c2336", border2:"#252f45",
  teal:"#00d4aa", amber:"#ffb347", purple:"#b39ddb",
  red:"#ff6b6b", blue:"#5ba8ff", green:"#4ade80",
  text:"#c8d6ef", muted:"#5a6a85", dim:"#2c3a52",
  mono:"'IBM Plex Mono',monospace", sans:"'Manrope',sans-serif",
};

const STORAGE_KEY = "cursor-calc:v2";
const PRICING_UPDATED = "2026-05-21";
let _id = 20;
const uid = (prefix="m") => `${prefix}${_id++}`;

const DEFAULT_STEPS = [
  { id:1, name:"Review / Plan", inputK:28, cacheK:8,  outputK:4  },
  { id:2, name:"Code",          inputK:67, cacheK:18, outputK:8  },
  { id:3, name:"Review / Plan", inputK:45, cacheK:14, outputK:4  },
  { id:4, name:"Code",          inputK:80, cacheK:22, outputK:8  },
];
const DEFAULT_MODELS = [
  { id:"c25s",  name:"Composer 2.5",      inputP:0.50, cacheP:0.20, outputP:2.50,  color:"#00d4aa" },
  { id:"c25f",  name:"Composer 2.5 Fast", inputP:3.00, cacheP:0.50, outputP:15.00, color:"#5ba8ff" },
  { id:"gpt55", name:"GPT-5.5",           inputP:5.00, cacheP:0.50, outputP:30.00, color:"#ffb347" },
  { id:"claude47", name:"Claude 4.7 Sonnet", inputP:3.00, cacheP:0.30, outputP:15.00, color:"#c084fc" },
  { id:"opus47", name:"Claude 4.7 Opus", inputP:15.00, cacheP:1.50, outputP:75.00, color:"#f472b6" },
];
const PLANS = [
  { name:"Hobby", price:0, allowance:"Basis" },
  { name:"Pro",   price:20  },
  { name:"Pro+",  price:60  },
  { name:"Ultra", price:200 },
];
const PRESETS = [
  { name:"Small Bugfix", steps:[{id:uid("s"),name:"Analyse",inputK:20,cacheK:5,outputK:3},{id:uid("s"),name:"Patch",inputK:35,cacheK:10,outputK:5}] },
  { name:"Feature", steps:[{id:uid("s"),name:"Plan",inputK:35,cacheK:10,outputK:5},{id:uid("s"),name:"Implement",inputK:75,cacheK:25,outputK:10},{id:uid("s"),name:"Review",inputK:55,cacheK:18,outputK:5}] },
  { name:"Large Refactor", steps:[{id:uid("s"),name:"Explore",inputK:90,cacheK:30,outputK:8},{id:uid("s"),name:"Plan",inputK:70,cacheK:25,outputK:9},{id:uid("s"),name:"Refactor",inputK:140,cacheK:45,outputK:16},{id:uid("s"),name:"Validate",inputK:80,cacheK:25,outputK:7}] },
];
const RATES = { USD:1, EUR:0.92 };
const SYMBOLS = { USD:"$", EUR:"€" };

const fmtTok = k => k >= 1000 ? `${(k/1000).toFixed(1)}M` : `${k}k`;
const fmtMoney = (n, cur) => {
  const v = n * RATES[cur];
  return v < 0.005 ? `<${SYMBOLS[cur]}0.01` : `${SYMBOLS[cur]}${v.toFixed(2)}`;
};
const calcCost = (m, inK, cacheK, outK) => ((Math.max(inK-cacheK,0))/1000)*m.inputP + (cacheK/1000)*m.cacheP + (outK/1000)*m.outputP;
const defaultConfig = () => ({steps:DEFAULT_STEPS,models:DEFAULT_MODELS,sessions:9,cModelId:"c25f",rModelId:"gpt55",revInK:80,revCacheK:20,revOutK:12,reviewEvery:10,currency:"USD"});
const cloneSteps = steps => steps.map(s => ({...s,id:uid("s")}));
const encodeConfig = cfg => btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
const decodeConfig = raw => JSON.parse(decodeURIComponent(escape(atob(raw))));
function loadConfig() {
  const qs = new URLSearchParams(location.search);
  try {
    if (qs.has("config")) return {...defaultConfig(), ...decodeConfig(qs.get("config"))};
    return {...defaultConfig(), ...(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {})};
  } catch(e) { return defaultConfig(); }
}

function Panel({ title, badge, children }) {
  return (
    <div style={{background:C.s1,borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
      <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
        <span style={{fontWeight:800,fontSize:12,color:C.text}}>{title}</span>
        {badge && <span style={{fontFamily:C.mono,fontSize:10,color:C.muted,background:C.s3,padding:"2px 8px",borderRadius:4}}>{badge}</span>}
      </div>
      <div style={{padding:14}}>{children}</div>
    </div>
  );
}

function Label({children}) {
  return <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginBottom:4,letterSpacing:0.3}}>{children}</div>;
}

function TokSlider({label, value, onChange, color, max}) {
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:11,color:C.muted,fontFamily:C.mono}}>{label}</span>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <input type="number" value={value} min={1} max={max} step={1}
            aria-label={label}
            onChange={e=>onChange(Math.max(1,Math.round(parseFloat(e.target.value)||1)))}
            style={{width:64,background:C.s3,border:`1px solid ${C.border2}`,
              borderRadius:4,color,fontFamily:C.mono,fontSize:13,padding:"4px 6px",textAlign:"right"}}/>
          <span style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>k</span>
        </div>
      </div>
      <input type="range" min={1} max={max} step={1} value={value}
        aria-label={`${label} Slider`}
        onChange={e=>onChange(Number(e.target.value))}
        style={{accentColor:color,color}}/>
    </div>
  );
}

function ModelSelect({models, value, onChange, label="Modell"}) {
  return (
    <div style={{position:"relative"}}>
      <select value={value} aria-label={label} onChange={e=>onChange(e.target.value)}
        style={{width:"100%",background:C.s3,border:`1px solid ${C.border2}`,
          borderRadius:5,color:C.text,fontFamily:C.sans,fontSize:13,padding:"9px 30px 9px 10px"}}>
        {models.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
      </select>
      <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.muted,pointerEvents:"none"}}>▾</div>
    </div>
  );
}

function StatCard({label, value, sub, color, big}) {
  return (
    <div style={{background:C.s2,borderRadius:8,padding:"11px 12px",border:`1px solid ${C.border}`}}>
      <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{label}</div>
      <div style={{fontFamily:C.mono,fontWeight:big?700:600,fontSize:big?18:14,color,lineHeight:1.2}}>{value}</div>
      {sub && <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginTop:3}}>{sub}</div>}
    </div>
  );
}

function App() {
  const initial = loadConfig();
  const [steps,    setSteps]    = useState(initial.steps);
  const [models,   setModels]   = useState(initial.models);
  const [sessions, setSessions] = useState(initial.sessions);
  const [cModelId, setCModelId] = useState(initial.cModelId);
  const [rModelId, setRModelId] = useState(initial.rModelId);
  const [revInK,   setRevInK]   = useState(initial.revInK);
  const [revCacheK,setRevCacheK]= useState(initial.revCacheK);
  const [revOutK,  setRevOutK]  = useState(initial.revOutK);
  const [reviewEvery,setReviewEvery]=useState(initial.reviewEvery);
  const [currency, setCurrency] = useState(initial.currency);
  const [addOpen,  setAddOpen]  = useState(false);
  const [draft,    setDraft]    = useState({name:"",inputP:1.00,cacheP:0.10,outputP:5.00,color:"#c084fc"});
  const [tab,      setTab]      = useState("steps");
  const [shareUrl, setShareUrl] = useState("");
  const importRef = useRef(null);

  const sesInK  = steps.reduce((s,x)=>s+x.inputK, 0);
  const sesCacheK = steps.reduce((s,x)=>s+Math.min(x.cacheK||0,x.inputK), 0);
  const sesOutK = steps.reduce((s,x)=>s+x.outputK, 0);
  const totInK  = sessions * sesInK;
  const totCacheK = sessions * sesCacheK;
  const totOutK = sessions * sesOutK;
  const cModel  = models.find(m=>m.id===cModelId) || models[0];
  const rModel  = models.find(m=>m.id===rModelId) || cModel;
  const reviewCount = Math.max(1, Math.ceil(sessions / reviewEvery));
  const sesCost = calcCost(cModel, sesInK, sesCacheK, sesOutK);
  const totCost = calcCost(cModel, totInK, totCacheK, totOutK);
  const oneRevCost = calcCost(rModel, revInK, Math.min(revCacheK,revInK), revOutK);
  const revCost = reviewCount * oneRevCost;
  const grand   = totCost + revCost;
  const pct     = n => grand ? Math.min(n/grand*100,100).toFixed(0)+"%" : "0%";
  const money   = n => fmtMoney(n, currency);
  const cfg = {steps,models,sessions,cModelId,rModelId,revInK,revCacheK,revOutK,reviewEvery,currency};

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  }, [steps,models,sessions,cModelId,rModelId,revInK,revCacheK,revOutK,reviewEvery,currency]);

  const updStep  = (id,f,v) => setSteps(ss=>ss.map(s=>s.id===id?{...s,[f]:f==="cacheK"?Math.min(v,s.inputK):v}:s));
  const addStep  = () => setSteps(ss=>[...ss,{id:uid("s"),name:"Neuer Step",inputK:30,cacheK:5,outputK:5}]);
  const delStep  = id => { if(steps.length>1) setSteps(ss=>ss.filter(s=>s.id!==id)); };
  const dupStep  = step => setSteps(ss=>ss.flatMap(s=>s.id===step.id?[s,{...step,id:uid("s"),name:`${step.name} Kopie`}]:[s]));
  const moveStep = (i,d) => setSteps(ss=>{ const n=[...ss], j=i+d; if(j<0||j>=n.length) return ss; [n[i],n[j]]=[n[j],n[i]]; return n; });
  const updModel = (id,f,v) => setModels(ms=>ms.map(m=>m.id===id?{...m,[f]:v}:m));
  const delModel = id => {
    if(models.length<=1) return;
    const next = models.filter(m=>m.id!==id);
    setModels(next);
    const fb = next[0]?.id||"";
    if(cModelId===id) setCModelId(fb);
    if(rModelId===id) setRModelId(fb);
  };
  const commitAdd = () => {
    if(!draft.name.trim()) return;
    setModels(ms=>[...ms,{...draft,id:uid("m")}]);
    setDraft({name:"",inputP:1.00,cacheP:0.10,outputP:5.00,color:"#c084fc"});
    setAddOpen(false);
  };
  const resetAll = () => {
    if(!confirm("Alle Einstellungen zurücksetzen?")) return;
    const d=defaultConfig();
    setSteps(d.steps); setModels(d.models); setSessions(d.sessions); setCModelId(d.cModelId); setRModelId(d.rModelId);
    setRevInK(d.revInK); setRevCacheK(d.revCacheK); setRevOutK(d.revOutK); setReviewEvery(d.reviewEvery); setCurrency(d.currency);
  };
  const exportConfig = () => {
    const url = URL.createObjectURL(new Blob([JSON.stringify(cfg,null,2)], {type:"application/json"}));
    const a = document.createElement("a"); a.href=url; a.download="cursor-calc-config.json"; a.click(); URL.revokeObjectURL(url);
  };
  const importConfig = e => {
    const file = e.target.files[0]; if(!file) return;
    file.text().then(t => {
      try {
        const d={...defaultConfig(),...JSON.parse(t)};
        setSteps(d.steps); setModels(d.models); setSessions(d.sessions); setCModelId(d.cModelId); setRModelId(d.rModelId);
        setRevInK(d.revInK); setRevCacheK(d.revCacheK); setRevOutK(d.revOutK); setReviewEvery(d.reviewEvery); setCurrency(d.currency);
      } catch(err) { alert("Import fehlgeschlagen: Ungültige JSON-Datei"); }
      e.target.value="";
    });
  };
  const shareConfig = async () => {
    const url = `${location.origin}${location.pathname}?config=${encodeConfig(cfg)}`;
    try { await navigator.clipboard.writeText(url); alert("Share-Link kopiert"); }
    catch(e) { setShareUrl(url); }
  };

  const tabs = [
    {id:"steps",   icon:"⬡", label:"Steps"},
    {id:"config",  icon:"⚙", label:"Config"},
    {id:"models",  icon:"◈", label:"Modelle"},
    {id:"results", icon:"◎", label:"Ergebnis"},
  ];

  return (
    <div style={{background:C.bg,minHeight:"100%",display:"flex",flexDirection:"column"}}>

      {/* ── Sticky Header ── */}
      <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,
        padding:"12px 14px",position:"sticky",top:0,zIndex:10,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,flexShrink:0,
            background:`linear-gradient(135deg,${C.teal},${C.blue})`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⬡</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:14,letterSpacing:-0.3}}>Cursor Calc</div>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>
              {sessions} Sessions · {fmtTok(sesInK+sesOutK)}/Session
            </div>
          </div>
          <div style={{fontFamily:C.mono,fontWeight:800,fontSize:20,color:C.purple,flexShrink:0}}>
            {money(grand)}
          </div>
        </div>
      </div>

      {/* ── Tab Bar ── */}
      <div style={{display:"flex",background:C.s1,borderBottom:`1px solid ${C.border}`,
        position:"sticky",top:56,zIndex:9,flexShrink:0}}>
        {tabs.map(t=>(
          <button key={t.id} aria-label={`${t.label} öffnen`} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"11px 0",background:"transparent",border:"none",
            borderBottom:tab===t.id?`2px solid ${C.teal}`:`2px solid transparent`,
            color:tab===t.id?C.teal:C.muted,fontWeight:700,fontSize:11,
            display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:14}}>{t.icon}</span>
            <span style={{letterSpacing:0.3}}>{t.label}</span>
          </button>
        ))}
      </div>

      {/* ── Content ── */}
      <div style={{flex:1,overflowY:"auto",padding:12,maxWidth:700,width:"100%",margin:"0 auto"}}>
        <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,padding:10,marginBottom:12,
          fontFamily:C.mono,fontSize:11,color:C.muted}}>
          Preise zuletzt aktualisiert: {PRICING_UPDATED}. Bitte gegen aktuelle Cursor-/Modellpreise prüfen.
        </div>

        {/* STEPS */}
        {tab==="steps" && (
          <Panel title="Workflow Steps"
            badge={`${fmtTok(sesInK)} in · ${fmtTok(sesCacheK)} cache · ${fmtTok(sesOutK)} out · ${money(sesCost)}/Session`}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginBottom:12}}>
              {PRESETS.map(p=>(
                <button key={p.name} onClick={()=>setSteps(cloneSteps(p.steps))}
                  style={{background:C.s3,border:`1px solid ${C.border2}`,borderRadius:7,color:C.text,
                    fontWeight:700,fontSize:12,padding:"10px"}}>Preset: {p.name}</button>
              ))}
            </div>
            {steps.map((step,i)=>(
              <div key={step.id} style={{background:C.s3,borderRadius:8,padding:12,
                border:`1px solid ${C.border}`,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <span style={{fontFamily:C.mono,fontSize:11,color:C.muted,
                    background:C.s2,borderRadius:4,padding:"2px 8px",flexShrink:0}}>{i+1}</span>
                  <input aria-label={`Name für Step ${i+1}`} value={step.name} onChange={e=>updStep(step.id,"name",e.target.value)}
                    style={{flex:1,background:"transparent",border:"none",color:C.text,
                      fontFamily:C.sans,fontWeight:700,fontSize:13,outline:"none",minWidth:0}}/>
                  <button aria-label={`${step.name} nach oben verschieben`} disabled={i===0} onClick={()=>moveStep(i,-1)}
                    style={{background:C.s2,border:`1px solid ${C.border2}`,borderRadius:6,
                      color:C.muted,fontSize:13,padding:"4px 7px",flexShrink:0}}>↑</button>
                  <button aria-label={`${step.name} nach unten verschieben`} disabled={i===steps.length-1} onClick={()=>moveStep(i,1)}
                    style={{background:C.s2,border:`1px solid ${C.border2}`,borderRadius:6,
                      color:C.muted,fontSize:13,padding:"4px 7px",flexShrink:0}}>↓</button>
                  <button aria-label={`${step.name} duplizieren`} onClick={()=>dupStep(step)}
                    style={{background:`${C.blue}22`,border:`1px solid ${C.blue}44`,borderRadius:6,
                      color:C.blue,fontSize:13,padding:"4px 8px",flexShrink:0}}>⧉</button>
                  <button aria-label={`${step.name} löschen`} disabled={steps.length<=1} onClick={()=>delStep(step.id)}
                    style={{background:`${C.red}22`,border:`1px solid ${C.red}44`,borderRadius:6,
                      color:C.red,fontSize:14,lineHeight:1,padding:"4px 8px",flexShrink:0}}>✕</button>
                </div>
                <TokSlider label="Input-Tokens" value={step.inputK} color={C.teal} max={500}
                  onChange={v=>updStep(step.id,"inputK",v)}/>
                <TokSlider label="Cache-Read Tokens" value={Math.min(step.cacheK||1,step.inputK)} color={C.muted} max={step.inputK}
                  onChange={v=>updStep(step.id,"cacheK",v)}/>
                <TokSlider label="Output-Tokens" value={step.outputK} color={C.amber} max={100}
                  onChange={v=>updStep(step.id,"outputK",v)}/>
                <div style={{fontFamily:C.mono,fontSize:11,color:C.blue,marginTop:2}}>
                  ⟹ {money(calcCost(cModel,step.inputK,Math.min(step.cacheK||0,step.inputK),step.outputK))} mit {cModel.name}
                </div>
              </div>
            ))}
            <button onClick={addStep} style={{width:"100%",background:"transparent",
              border:`1px dashed ${C.border2}`,borderRadius:8,color:C.muted,
              fontWeight:700,fontSize:13,padding:"13px 0"}}>+ Step hinzufügen</button>
          </Panel>
        )}

        {/* CONFIG */}
        {tab==="config" && (<>
          <Panel title="Session-Konfiguration">
            <div style={{marginBottom:18}}>
              <Label>Composer Sessions (N)</Label>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input aria-label="Composer Sessions" type="range" min={1} max={100} value={sessions}
                  onChange={e=>setSessions(Number(e.target.value))}
                  style={{flex:1,accentColor:C.teal,color:C.teal}}/>
                <span style={{fontFamily:C.mono,fontWeight:800,fontSize:24,
                  color:C.teal,minWidth:36,textAlign:"right"}}>{sessions}</span>
              </div>
            </div>
            <Label>Modell für Sessions</Label>
            <ModelSelect label="Modell für Sessions" models={models} value={cModelId} onChange={setCModelId}/>
            <div style={{marginTop:10,fontFamily:C.mono,fontSize:12,color:cModel.color}}>
              Kosten gesamt: {money(totCost)}
            </div>
          </Panel>
          <Panel title={`Review-Session (${reviewCount}× je ${reviewEvery} Sessions)`}>
            <div style={{marginBottom:14}}>
              <Label>Review-Modell</Label>
              <ModelSelect label="Review-Modell" models={models} value={rModelId} onChange={setRModelId}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:12}}>
              <div>
                <Label>Intervall</Label>
                <input aria-label="Review-Intervall" type="number" value={reviewEvery} min={1} max={100} step={1}
                  onChange={e=>setReviewEvery(Math.max(1,parseInt(e.target.value)||1))}
                  style={{width:"100%",background:C.s3,border:`1px solid ${C.border2}`,
                    borderRadius:4,color:C.purple,fontFamily:C.mono,fontSize:15,
                    padding:"9px 10px",textAlign:"right"}}/>
              </div>
              <div>
                <Label>Input-Tokens (k)</Label>
                <input aria-label="Review Input-Tokens" type="number" value={revInK} min={1} max={2000} step={1}
                  onChange={e=>setRevInK(Math.max(1,parseInt(e.target.value)||1))}
                  style={{width:"100%",background:C.s3,border:`1px solid ${C.border2}`,
                    borderRadius:4,color:C.teal,fontFamily:C.mono,fontSize:15,
                    padding:"9px 10px",textAlign:"right"}}/>
              </div>
              <div>
                <Label>Cache-Read (k)</Label>
                <input aria-label="Review Cache-Read Tokens" type="number" value={revCacheK} min={1} max={revInK} step={1}
                  onChange={e=>setRevCacheK(Math.min(revInK,Math.max(1,parseInt(e.target.value)||1)))}
                  style={{width:"100%",background:C.s3,border:`1px solid ${C.border2}`,
                    borderRadius:4,color:C.muted,fontFamily:C.mono,fontSize:15,
                    padding:"9px 10px",textAlign:"right"}}/>
              </div>
              <div>
                <Label>Output-Tokens (k)</Label>
                <input aria-label="Review Output-Tokens" type="number" value={revOutK} min={1} max={500} step={1}
                  onChange={e=>setRevOutK(Math.max(1,parseInt(e.target.value)||1))}
                  style={{width:"100%",background:C.s3,border:`1px solid ${C.border2}`,
                    borderRadius:4,color:C.amber,fontFamily:C.mono,fontSize:15,
                    padding:"9px 10px",textAlign:"right"}}/>
              </div>
            </div>
            <div style={{marginTop:10,fontFamily:C.mono,fontSize:12,color:rModel.color}}>
              Review-Kosten: {reviewCount} × {money(oneRevCost)} = {money(revCost)}
            </div>
          </Panel>
          <Panel title="Daten & Teilen">
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
              <button onClick={shareConfig} style={{background:`${C.teal}22`,border:`1px solid ${C.teal}`,borderRadius:7,color:C.teal,fontWeight:700,padding:"10px"}}>Share-Link</button>
              <button onClick={exportConfig} style={{background:C.s3,border:`1px solid ${C.border2}`,borderRadius:7,color:C.text,fontWeight:700,padding:"10px"}}>Export JSON</button>
              <button onClick={()=>importRef.current.click()} style={{background:C.s3,border:`1px solid ${C.border2}`,borderRadius:7,color:C.text,fontWeight:700,padding:"10px"}}>Import JSON</button>
              <button onClick={resetAll} style={{background:`${C.red}22`,border:`1px solid ${C.red}44`,borderRadius:7,color:C.red,fontWeight:700,padding:"10px"}}>Reset</button>
            </div>
            <input ref={importRef} aria-label="Konfiguration importieren" type="file" accept="application/json" onChange={importConfig} style={{display:"none"}}/>
            {shareUrl && <input aria-label="Share-Link" readOnly value={shareUrl} onFocus={e=>e.target.select()}
              style={{marginTop:10,width:"100%",background:C.s3,border:`1px solid ${C.border2}`,
                borderRadius:4,color:C.text,fontFamily:C.mono,fontSize:11,padding:"9px 10px"}}/>}
          </Panel>
        </>)}

        {/* MODELS */}
        {tab==="models" && (
          <Panel title="Modelle & Preise" badge={`${currency} / Million Tokens`}>
            <div style={{display:"flex",justifyContent:"space-between",gap:10,alignItems:"center",marginBottom:12}}>
              <span style={{fontFamily:C.mono,fontSize:11,color:C.muted}}>Währung</span>
              <ModelSelect label="Währung" models={Object.keys(RATES).map(id=>({id,name:id}))} value={currency} onChange={setCurrency}/>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontFamily:C.mono,fontSize:9,color:C.muted,letterSpacing:0.5,marginBottom:8}}>
                KOSTEN-VORSCHAU ({sessions} SESSIONS)
              </div>
              {models.map(m=>{
                const total=calcCost(m,totInK,totCacheK,totOutK);
                const maxC=Math.max(...models.map(x=>calcCost(x,totInK,totCacheK,totOutK)));
                return (
                  <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
                    <span style={{fontFamily:C.mono,fontSize:11,color:m.color,
                      width:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flexShrink:0}}>
                      {m.name}
                    </span>
                    <div style={{flex:1,height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${maxC>0?(total/maxC)*100:0}%`,
                        background:m.color,borderRadius:3,transition:"width 0.25s"}}/>
                    </div>
                    <span style={{fontFamily:C.mono,fontSize:11,color:C.text,
                      minWidth:55,textAlign:"right"}}>{money(total)}</span>
                  </div>
                );
              })}
            </div>
            {models.map(m=>(
              <div key={m.id} style={{background:C.s3,borderRadius:8,padding:12,
                border:`1px solid ${C.border}`,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <input aria-label={`Farbe für ${m.name}`} type="color" value={m.color} onChange={e=>updModel(m.id,"color",e.target.value)}
                    style={{width:28,height:28,border:"none",borderRadius:4,
                      cursor:"pointer",padding:0,background:"none",flexShrink:0}}/>
                  <input aria-label="Modellname" value={m.name} onChange={e=>updModel(m.id,"name",e.target.value)}
                    style={{flex:1,background:"transparent",border:"none",color:m.color,
                      fontFamily:C.sans,fontWeight:700,fontSize:13,outline:"none",minWidth:0}}/>
                  <button aria-label={`${m.name} löschen`} disabled={models.length<=1} onClick={()=>delModel(m.id)}
                    style={{background:`${C.red}22`,border:`1px solid ${C.red}44`,borderRadius:6,
                      color:C.red,fontSize:14,padding:"4px 8px",flexShrink:0}}>✕</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                  {[["inputP","Input",C.teal],["cacheP","Cache",C.muted],["outputP","Output",C.amber]].map(([f,l,c])=>(
                    <div key={f}>
                      <Label>{l} $/M</Label>
                      <input aria-label={`${m.name} ${l} Preis`} type="number" value={m[f]} min={0} max={9999} step={0.01}
                        onChange={e=>updModel(m.id,f,parseFloat(e.target.value)||0)}
                        style={{width:"100%",background:C.s2,border:`1px solid ${C.border2}`,
                          borderRadius:4,color:c,fontFamily:C.mono,fontSize:13,
                          padding:"7px 8px",textAlign:"right"}}/>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            {addOpen ? (
              <div style={{background:C.s3,borderRadius:8,padding:12,border:`1px solid ${C.border2}`}}>
                <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginBottom:10,letterSpacing:0.3}}>
                  NEUES MODELL
                </div>
                <div style={{marginBottom:10}}>
                  <Label>Name</Label>
                  <input aria-label="Name des neuen Modells" value={draft.name} placeholder="z.B. Claude 4.7 Opus"
                    onChange={e=>setDraft(d=>({...d,name:e.target.value}))}
                    style={{width:"100%",background:C.s1,border:`1px solid ${C.border2}`,
                      borderRadius:4,color:C.text,fontFamily:C.sans,fontSize:13,padding:"9px 10px"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                  {[["inputP","Input"],["cacheP","Cache-Read"],["outputP","Output"]].map(([f,l])=>(
                    <div key={f}>
                      <Label>{l} $/M</Label>
                      <input aria-label={`Neues Modell ${l} Preis`} type="number" value={draft[f]} min={0} step={0.01}
                        onChange={e=>setDraft(d=>({...d,[f]:parseFloat(e.target.value)||0}))}
                        style={{width:"100%",background:C.s1,border:`1px solid ${C.border2}`,
                          borderRadius:4,color:C.text,fontFamily:C.mono,fontSize:13,
                          padding:"7px 8px",textAlign:"right"}}/>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <Label>Farbe:</Label>
                  <input aria-label="Farbe des neuen Modells" type="color" value={draft.color}
                    onChange={e=>setDraft(d=>({...d,color:e.target.value}))}
                    style={{width:44,height:36,border:`1px solid ${C.border2}`,
                      borderRadius:4,cursor:"pointer",padding:2,background:C.s1}}/>
                  <span style={{fontFamily:C.mono,fontSize:11,color:draft.color}}>{draft.color}</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={commitAdd} style={{flex:1,background:`${C.teal}22`,
                    border:`1px solid ${C.teal}`,borderRadius:7,color:C.teal,
                    fontWeight:700,fontSize:13,padding:"11px 0"}}>Hinzufügen</button>
                  <button onClick={()=>setAddOpen(false)} style={{background:"transparent",
                    border:`1px solid ${C.border2}`,borderRadius:7,color:C.muted,
                    fontWeight:600,fontSize:13,padding:"11px 16px"}}>Abbrechen</button>
                </div>
              </div>
            ) : (
              <button onClick={()=>setAddOpen(true)} style={{width:"100%",background:"transparent",
                border:`1px dashed ${C.border2}`,borderRadius:8,color:C.muted,
                fontWeight:700,fontSize:13,padding:"13px 0"}}>+ Modell hinzufügen</button>
            )}
          </Panel>
        )}

        {/* RESULTS */}
        {tab==="results" && (<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            <StatCard label="Input / Session"  value={fmtTok(sesInK)}  color={C.teal}  sub={`×${sessions} = ${fmtTok(totInK)}`}/>
            <StatCard label="Cache / Session"  value={fmtTok(sesCacheK)} color={C.muted} sub={`×${sessions} = ${fmtTok(totCacheK)}`}/>
            <StatCard label="Output / Session" value={fmtTok(sesOutK)} color={C.amber} sub={`×${sessions} = ${fmtTok(totOutK)}`}/>
            <StatCard label={`${reviewCount}× Review`} value={money(revCost)} color={rModel.color} sub={rModel.name}/>
          </div>

          <div style={{background:C.s2,borderRadius:10,padding:"18px 14px",
            border:`1px solid ${C.border2}`,marginBottom:12,textAlign:"center"}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginBottom:6}}>
              ∑ GESAMTKOSTEN · {sessions+reviewCount} SESSIONS
            </div>
            <div style={{fontFamily:C.mono,fontWeight:800,fontSize:36,color:C.purple}}>
              {money(grand)}
            </div>
            <div style={{fontFamily:C.mono,fontSize:11,color:C.muted,marginTop:6}}>
              {fmtTok(totInK+(reviewCount*revInK))} Input · {fmtTok(totCacheK+(reviewCount*revCacheK))} Cache · {fmtTok(totOutK+(reviewCount*revOutK))} Output
            </div>
          </div>

          <Panel title="Aufschlüsselung">
            {[
              {label:`1 Session (${cModel.name})`,inK:sesInK,cacheK:sesCacheK,outK:sesOutK,m:cModel,cost:sesCost},
              {label:`${sessions}× Sessions`,inK:totInK,cacheK:totCacheK,outK:totOutK,m:cModel,cost:totCost,bold:true},
              {label:`${reviewCount}× Review`,inK:reviewCount*revInK,cacheK:reviewCount*revCacheK,outK:reviewCount*revOutK,m:rModel,cost:revCost,bold:true},
            ].map((r,i)=>(
              <div key={i} style={{padding:"11px 0",borderBottom:`1px solid ${C.border}`,
                display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <div style={{fontWeight:r.bold?700:400,color:r.bold?r.m.color:C.muted,fontSize:12}}>
                  {r.label}
                </div>
                <div style={{display:"flex",gap:10,fontFamily:C.mono,fontSize:12}}>
                  <span style={{color:C.teal}}>{fmtTok(r.inK)}</span>
                  <span style={{color:C.muted}}>{fmtTok(r.cacheK)}</span>
                  <span style={{color:C.amber}}>{fmtTok(r.outK)}</span>
                  <span style={{color:C.text,fontWeight:700}}>{money(r.cost)}</span>
                  <span style={{color:C.muted,minWidth:36,textAlign:"right"}}>{pct(r.cost)}</span>
                </div>
              </div>
            ))}
            <div style={{paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:800,color:C.text}}>∑ Durchgang</span>
              <span style={{fontFamily:C.mono,fontWeight:800,fontSize:18,color:C.purple}}>{money(grand)}</span>
            </div>
          </Panel>

          <Panel title="Step-Breakdown">
            {steps.map((s,i)=>(
              <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"9px 10px",background:C.s3,borderRadius:7,border:`1px solid ${C.border}`,marginBottom:7}}>
                <div>
                  <span style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginRight:8}}>{i+1}</span>
                  <span style={{fontWeight:700,fontSize:12}}>{s.name}</span>
                </div>
                <div style={{display:"flex",gap:8,fontFamily:C.mono,fontSize:12}}>
                  <span style={{color:C.teal}}>{fmtTok(s.inputK)}</span>
                  <span style={{color:C.muted}}>{fmtTok(Math.min(s.cacheK||0,s.inputK))}</span>
                  <span style={{color:C.amber}}>{fmtTok(s.outputK)}</span>
                  <span style={{color:C.blue}}>{money(calcCost(cModel,s.inputK,Math.min(s.cacheK||0,s.inputK),s.outputK))}</span>
                </div>
              </div>
            ))}
          </Panel>

          <Panel title="Plan-Abdeckung / Monat">
            {PLANS.map(plan=>{
              const cycles=plan.price>0?Math.floor(plan.price/grand):0;
              const barPct=plan.price>0?Math.min((grand/plan.price)*100,100):0;
              const ok=plan.price>0 && grand<=plan.price;
              return (
                <div key={plan.name} style={{background:C.s3,borderRadius:8,padding:"12px 13px",
                  border:`1px solid ${ok?C.teal+"44":C.border}`,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
                    <span style={{fontWeight:800,fontSize:13}}>{plan.name}</span>
                    <span style={{fontFamily:C.mono,fontSize:12,color:C.muted}}>{plan.price?`${money(plan.price)}/Mo`:plan.allowance}</span>
                  </div>
                  <div style={{height:6,background:C.border,borderRadius:3,marginBottom:9,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${barPct}%`,
                      background:ok?C.green:C.red,borderRadius:3,transition:"width 0.3s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                    <span style={{fontFamily:C.mono,fontWeight:700,color:ok?C.green:C.red}}>
                      {plan.price?`~${cycles}× Durchgänge/Mo`:"Kein Budget hinterlegt"}
                    </span>
                    <span style={{fontFamily:C.mono,color:C.muted}}>
                      {plan.price?`${Math.min(barPct,100).toFixed(0)}% verbraucht`:plan.allowance}
                    </span>
                  </div>
                </div>
              );
            })}
          </Panel>
        </>)}

        <div style={{height:80}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
