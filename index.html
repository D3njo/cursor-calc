<script>
// Apple touch icon (inline SVG as data URI)
const appleIcon = document.createElement("link");
appleIcon.rel = "apple-touch-icon";
appleIcon.href = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%2307090e'/%3E%3Cpolygon points='256,60 420,160 420,352 256,452 92,352 92,160' fill='none' stroke='%2300d4aa' stroke-width='28'/%3E%3Ctext x='256' y='300' text-anchor='middle' font-size='180' font-weight='900' fill='%2300d4aa' font-family='monospace'%3E%E2%AC%A1%3C/text%3E%3C/svg%3E";
document.head.appendChild(appleIcon);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', {scope:'./'})
      .then(reg => {
        console.log('SW registered');

        // Tell a freshly installed waiting worker to take over immediately.
        const promote = w => { try { w.postMessage('SKIP_WAITING'); } catch(e){} };
        if (reg.waiting) promote(reg.waiting);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              promote(nw);
            }
          });
        });

        // Poll for updates periodically and whenever the page becomes visible
        // again, so phones / long-lived tabs pick up new deploys quickly.
        const checkForUpdate = () => { try { reg.update(); } catch(e){} };
        setInterval(checkForUpdate, 60 * 1000);
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') checkForUpdate();
        });
        window.addEventListener('focus', checkForUpdate);
        window.addEventListener('online', checkForUpdate);
      })
      .catch(e => console.log('SW error:', e));

    // When the active SW changes (i.e. a new version took control),
    // reload exactly once so the user sees the latest assets right away.
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  });
}
</script>

    <div style="font-weight:800;font-size:13px;color:#c8d6ef">Install Cursor Calc</div>

<script>
// PWA Install Prompt
let deferredPrompt;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('dismiss-btn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  banner.classList.add('show');
});
installBtn.addEventListener('click', async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('show');
});
dismissBtn.addEventListener('click', () => banner.classList.remove('show'));
window.addEventListener('appinstalled', () => banner.classList.remove('show'));
</script>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

const C = {
  bg:"#07090e", s1:"#0d1018", s2:"#111520", s3:"#161c2a",
  border:"#1c2336", border2:"#252f45",
  teal:"#00d4aa", amber:"#ffb347", purple:"#b39ddb",
  red:"#ff6b6b", blue:"#5ba8ff", green:"#4ade80",
  text:"#c8d6ef", muted:"#5a6a85", dim:"#2c3a52",
  mono:"'IBM Plex Mono',monospace", sans:"'Manrope',sans-serif",
};

const STORAGE_KEY = "cursor-calc:v7";
const USER_DEFAULT_STORAGE_KEY = "cursor-calc:user-default:v1";
const CURSOR_CATALOG_URL = "./models.json";
const ESTIMATION_NOTICE =
  "Applies parsed docs rules (cache discounts, 2× >200k, Max/Fast mode). Image-output surcharges not modeled — compare with your usage dashboard.";
let _id = 20;
const uid = prefix => `${prefix}${_id++}`;

const {
  calcCost, resolveRates, normalizeStep, normalizeReviewTokens, DEFAULT_AUTO_POOL,
  calcCostWithRules, ruleBadges, totalInputK, resolveFastMode,
} = window.CursorCalcLib;

const PLACEHOLDER_MODEL_ID = "cursor-catalog-pending";
const STANDARD_CUSTOM_MODEL = {
  id:"custom-gemini-3-5-flash",
  name:"Gemini 3.5 Flash",
  inputP:1.5,
  cacheP:0.15,
  cacheWriteP:0,
  outputP:9,
  color:"#22d3ee",
  source:"custom",
  notes:"Not in Cursor docs yet. Prices estimated from Google Gemini API pricing; verify against your usage dashboard.",
  rules:{ notInCursorDocs:true },
};
const STANDARD_CUSTOM_MODEL_IDS = new Set([STANDARD_CUSTOM_MODEL.id]);
const DEFAULT_STEPS = [
  { id:1, name:"Review / Plan", inputK:6,  cacheReadK:94,  cacheWriteK:0, outputK:1, modelId:PLACEHOLDER_MODEL_ID },
  { id:2, name:"Code",          inputK:14, cacheReadK:201, cacheWriteK:0, outputK:1, modelId:PLACEHOLDER_MODEL_ID },
  { id:3, name:"Review / Plan", inputK:8,  cacheReadK:122, cacheWriteK:0, outputK:1, modelId:PLACEHOLDER_MODEL_ID },
  { id:4, name:"Code",          inputK:15, cacheReadK:219, cacheWriteK:0, outputK:1, modelId:PLACEHOLDER_MODEL_ID },
];
const DEFAULT_MODELS = [
  { id:PLACEHOLDER_MODEL_ID, name:"Loading Cursor models...", inputP:0, cacheP:0, cacheWriteP:0, outputP:0, color:"#5a6a85", source:"placeholder" },
  {...STANDARD_CUSTOM_MODEL},
];
const DEFAULT_ACTIVE_MODEL_IDS = [PLACEHOLDER_MODEL_ID, STANDARD_CUSTOM_MODEL.id];
const COLOR_PALETTE = ["#00d4aa","#5ba8ff","#ffb347","#c084fc","#f472b6","#4ade80","#22d3ee","#fb7185","#a3e635","#facc15"];
const PLANS = [
  { id:"hobby", name:"Hobby (extra)", defaultBudget:0 },
  { id:"pro",   name:"Pro",   defaultBudget:20 },
  { id:"proPlus", name:"Pro+", defaultBudget:70 },
  { id:"ultra", name:"Ultra", defaultBudget:400 },
];
const PRESETS = [
  { name:"Small Bugfix", steps:()=>[{id:uid("s"),name:"Analyze",inputK:15,cacheReadK:5,cacheWriteK:0,outputK:3,modelId:PLACEHOLDER_MODEL_ID},{id:uid("s"),name:"Patch",inputK:25,cacheReadK:10,cacheWriteK:0,outputK:5,modelId:PLACEHOLDER_MODEL_ID}] },
  { name:"Feature", steps:()=>[{id:uid("s"),name:"Plan",inputK:25,cacheReadK:10,cacheWriteK:0,outputK:5,modelId:PLACEHOLDER_MODEL_ID},{id:uid("s"),name:"Implement",inputK:50,cacheReadK:25,cacheWriteK:0,outputK:10,modelId:PLACEHOLDER_MODEL_ID},{id:uid("s"),name:"Review",inputK:37,cacheReadK:18,cacheWriteK:0,outputK:5,modelId:PLACEHOLDER_MODEL_ID}] },
  { name:"Large Refactor", steps:()=>[{id:uid("s"),name:"Explore",inputK:60,cacheReadK:30,cacheWriteK:0,outputK:8,modelId:PLACEHOLDER_MODEL_ID},{id:uid("s"),name:"Plan",inputK:45,cacheReadK:25,cacheWriteK:0,outputK:9,modelId:PLACEHOLDER_MODEL_ID},{id:uid("s"),name:"Refactor",inputK:95,cacheReadK:45,cacheWriteK:0,outputK:16,modelId:PLACEHOLDER_MODEL_ID},{id:uid("s"),name:"Validate",inputK:55,cacheReadK:25,cacheWriteK:0,outputK:7,modelId:PLACEHOLDER_MODEL_ID}] },
];
const USAGE_POOLS = [
  { id:"api", name:"API pool (per model)" },
  { id:"auto", name:"Auto + Composer pool" },
];
const RATES = { USD:1, EUR:0.92 };
const SYMBOLS = { USD:"$", EUR:"€" };

const fmtTok = k => k >= 1000 ? `${(k/1000).toFixed(1)}M` : `${k}k`;
const fmtMoney = (n, cur) => {
  const v = n * RATES[cur];
  if (Math.abs(v) < Number.EPSILON) return `${SYMBOLS[cur]}0.00`;
  return v < 0.005 ? `<${SYMBOLS[cur]}0.01` : `${SYMBOLS[cur]}${v.toFixed(2)}`;
};
const cloneSteps = steps => steps.map(s=>({...s}));
const cloneModels = models => models.map(m=>({...m}));
const defaultPlanBudgets = () => Object.fromEntries(PLANS.map(p=>[p.id,p.defaultBudget]));
const defaultConfig = () => ({
  steps:cloneSteps(DEFAULT_STEPS),models:cloneModels(DEFAULT_MODELS),activeModelIds:[...DEFAULT_ACTIVE_MODEL_IDS],
  sessions:5,cModelId:PLACEHOLDER_MODEL_ID,rModelId:PLACEHOLDER_MODEL_ID,
  revInK:10,revCacheReadK:70,revCacheWriteK:0,revOutK:1,reviewEvery:10,
  usagePool:"api",maxMode:false,sessionFastMode:false,fastModeByModelId:{},currency:"USD",planBudgets:defaultPlanBudgets()
});
const ratesForModel = (model, usagePool, autoPool) => resolveRates(model, usagePool, autoPool || DEFAULT_AUTO_POOL);
const pricingResult = (model, inputK, cacheReadK, cacheWriteK, outK, usagePool, autoPool, maxMode, sessionFastMode, fastModeByModelId) => {
  const fastMode = resolveFastMode(model, sessionFastMode, fastModeByModelId);
  return calcCostWithRules(
    ratesForModel(model, usagePool, autoPool),
    model?.rules,
    inputK, cacheReadK, cacheWriteK, outK,
    { maxMode, fastMode }
  );
};
const stepCost = (step, model, usagePool, autoPool, maxMode, sessionFastMode, fastModeByModelId) =>
  pricingResult(model, step.inputK, step.cacheReadK, step.cacheWriteK, step.outputK, usagePool, autoPool, maxMode, sessionFastMode, fastModeByModelId).cost;
const stepPricingMeta = (step, model, usagePool, autoPool, maxMode, sessionFastMode, fastModeByModelId) =>
  pricingResult(model, step.inputK, step.cacheReadK, step.cacheWriteK, step.outputK, usagePool, autoPool, maxMode, sessionFastMode, fastModeByModelId);
const toggleModelFastMode = (modelId, models, sessionFastMode, fastModeByModelId) => {
  const model = models.find(m => m.id === modelId);
  if (!model) return fastModeByModelId;
  const next = { ...fastModeByModelId };
  const current = resolveFastMode(model, sessionFastMode, next);
  next[modelId] = !current;
  return next;
};
const normalizeModelName = name => String(name||"Model").replace(/\s+/g," ").trim();
const modelKey = name => normalizeModelName(name).toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
const MAX_MODEL_ID_SLUG_LENGTH = 48;
const MIN_VALID_MODEL_KEY_LENGTH = 2;
const MIN_EXPECTED_CURSOR_MODELS = 30;
const modelIdFromName = name => {
  const slug = modelKey(name).replace(/\s+/g,"-").slice(0,MAX_MODEL_ID_SLUG_LENGTH);
  return slug ? `cursor-${slug}` : uid("cursor-m");
};
const isCustomModel = model => model?.source === "custom";
const isCursorModel = model => model?.source === "cursor";
const isPlaceholderModel = model => model?.source === "placeholder";
const INVALID_MODEL_KEYS = new Set(["model","name","input","output","price"]);
const INVALID_MODEL_KEY_PARTS = ["pricing","token"];
const isValidCatalogName = name => {
  const key = modelKey(name);
  if(!key || key.length < MIN_VALID_MODEL_KEY_LENGTH) return false;
  if(INVALID_MODEL_KEYS.has(key)) return false;
  if(INVALID_MODEL_KEY_PARTS.some(part=>key.includes(part))) return false;
  return true;
};
const clampReviewInterval = (value, fallback=0) => {
  const parsed = parseInt(value);
  return Number.isFinite(parsed) ? Math.min(100,Math.max(0,parsed)) : fallback;
};
const encodeConfig = cfg => btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
const decodeConfig = raw => JSON.parse(decodeURIComponent(escape(atob(raw))));
function sanitizeConfig(raw) {
  const d = defaultConfig();
  if (!raw || typeof raw !== "object") return d;
  let models = Array.isArray(raw.models) && raw.models.length ? raw.models.map(m=>({
    id:String(m.id||uid("m")), name:normalizeModelName(m.name),
    inputP:Number(m.inputP)||0, cacheP:Number(m.cacheP)||0, cacheWriteP:Number(m.cacheWriteP)||0, outputP:Number(m.outputP)||0,
    color:String(m.color||"#00d4aa"), source:String(m.source||"custom"),
    notes:typeof m.notes==="string"?m.notes:"",
    rules:m.rules && typeof m.rules==="object"?{...m.rules}:{}
  })) : d.models;
  if(!models.length) models = cloneModels(DEFAULT_MODELS);
  models = applyStandardCustomModels(models);
  const rawActive = Array.isArray(raw.activeModelIds) ? raw.activeModelIds.map(String) : d.activeModelIds;
  const activeModelIds = rawActive.filter(id=>models.some(m=>m.id===id));
  models.filter(isCustomModel).forEach(m=>{ if(!activeModelIds.includes(m.id)) activeModelIds.push(m.id); });
  if(!activeModelIds.length) activeModelIds.push(models[0].id);
  const availableModelIds = new Set(activeModelIds);
  const cModelId = availableModelIds.has(raw.cModelId)?raw.cModelId:activeModelIds[0];
  const steps = Array.isArray(raw.steps) && raw.steps.length
    ? raw.steps.map(s => {
        const norm = normalizeStep(s, cModelId);
        return {
          ...norm,
          id: s.id || norm.id || uid("s"),
          name: String(s.name || norm.name),
          modelId: availableModelIds.has(s.modelId) ? s.modelId : cModelId,
        };
      })
    : d.steps;
  const rev = normalizeReviewTokens(raw, d);
  const planBudgets = Object.fromEntries(PLANS.map(p=>[
    p.id,
    Math.max(0,Number(raw.planBudgets?.[p.id] ?? p.defaultBudget)||0)
  ]));
  const reviewEvery = clampReviewInterval(raw.reviewEvery, d.reviewEvery);
  const usagePool = raw.usagePool === "auto" ? "auto" : "api";
  const maxMode = !!raw.maxMode;
  const sessionFastMode = !!raw.sessionFastMode;
  const fastModeByModelId =
    raw.fastModeByModelId && typeof raw.fastModeByModelId === "object"
      ? Object.fromEntries(
          Object.entries(raw.fastModeByModelId).map(([k, v]) => [String(k), !!v])
        )
      : {};
  return {
    steps, models, activeModelIds,
    sessions:Math.min(50,Math.max(1,parseInt(raw.sessions)||d.sessions)),
    cModelId,
    rModelId:availableModelIds.has(raw.rModelId)?raw.rModelId:activeModelIds[0],
    revInK: rev.revInK,
    revCacheReadK: rev.revCacheReadK,
    revCacheWriteK: rev.revCacheWriteK,
    revOutK: rev.revOutK,
    reviewEvery,
    usagePool,
    maxMode,
    sessionFastMode,
    fastModeByModelId,
    currency:RATES[raw.currency]?raw.currency:d.currency,
    planBudgets
  };
}
function readStoredConfig(key) {
  const raw = localStorage.getItem(key);
  return raw ? sanitizeConfig(JSON.parse(raw)) : null;
}
function loadConfig() {
  const qs = new URLSearchParams(location.search);
  try {
    if (qs.has("config")) return sanitizeConfig(decodeConfig(qs.get("config")));
    return readStoredConfig(USER_DEFAULT_STORAGE_KEY) || readStoredConfig(STORAGE_KEY) || defaultConfig();
  } catch(e) { return defaultConfig(); }
}
/** Keep only the built-in standard custom model(s); drop other customs from saved config. */
function applyStandardCustomModels(models) {
  const nonCustom = models.filter(m=>!isCustomModel(m));
  const saved = models.find(m=>STANDARD_CUSTOM_MODEL_IDS.has(m.id));
  const standard = saved
    ? {...STANDARD_CUSTOM_MODEL,...saved,id:STANDARD_CUSTOM_MODEL.id,source:"custom",
        rules:{...STANDARD_CUSTOM_MODEL.rules,...(saved.rules||{})}}
    : {...STANDARD_CUSTOM_MODEL};
  return [...nonCustom, standard];
}
function isStandardCustomModel(model) {
  return isCustomModel(model) && STANDARD_CUSTOM_MODEL_IDS.has(model?.id);
}
function parseCatalogModels(payload) {
  const list = Array.isArray(payload?.models) ? payload.models : Array.isArray(payload) ? payload : [];
  const byKey = new Map();
  list.forEach((model, index) => {
    const name = normalizeModelName(model?.name);
    if(!isValidCatalogName(name)) return;
    const inputP = Number(model.inputP)||0;
    const outputP = Number(model.outputP)||0;
    if(!inputP || !outputP) return;
    const entry = {
      id:modelIdFromName(name),
      name,
      inputP,
      cacheP:Number(model.cacheP)||0,
      cacheWriteP:Number(model.cacheWriteP)||0,
      outputP,
      color:COLOR_PALETTE[index%COLOR_PALETTE.length],
      source:"cursor"
    };
    if(typeof model.notes==="string" && model.notes) entry.notes = model.notes;
    if(model.rules && typeof model.rules==="object") entry.rules = {...model.rules};
    byKey.set(modelKey(name), entry);
  });
  return [...byKey.values()];
}
function mergeCursorModels(currentModels, activeModelIds, cursorModels) {
  const currentByKey = new Map(currentModels.map(m=>[modelKey(m.name),m]));
  const mergedCursor = cursorModels.length ? cursorModels.map((m,i)=>{
    const existing = currentByKey.get(modelKey(m.name));
    return {
      ...m,
      id:existing && !isPlaceholderModel(existing) ? existing.id : m.id,
      color:existing?.color||COLOR_PALETTE[i%COLOR_PALETTE.length],
      notes:m.notes||existing?.notes||"",
      rules:m.rules||existing?.rules||{},
    };
  }) : currentModels.filter(m=>isCursorModel(m));
  const next = applyStandardCustomModels(mergedCursor);
  return next.map((m,i)=>({...m,color:m.color||COLOR_PALETTE[i%COLOR_PALETTE.length]}));
}

function Panel({ title, badge, children }) {
  return (
    <div style={{background:C.s1,borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
      <div style={{padding:"10px 14px",borderBottom:`1px solid ${C.border}`,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
        <span style={{fontWeight:800,fontSize:12,color:C.text}}>{title}</span>
        {badge && <span style={{fontFamily:C.mono,fontSize:10,color:C.muted,background:C.s3,padding:"2px 8px",borderRadius:4}}>{badge}</span>}
      </div>
      <div style={{padding:14}}>{children}</div>
    </div>
  );
}

function Label({children}) {
  return <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginBottom:4,letterSpacing:0.3}}>{children}</div>;
}

function TokSlider({label, value, onChange, color, max, min=1}) {
  return (
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:11,color:C.muted,fontFamily:C.mono}}>{label}</span>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <input type="number" value={value} min={min} max={max} step={1}
            aria-label={label}
            onChange={e=>onChange(Math.max(min,Math.round(parseFloat(e.target.value)||min)))}
            style={{width:64,background:C.s3,border:`1px solid ${C.border2}`,
              borderRadius:4,color,fontFamily:C.mono,fontSize:13,padding:"4px 6px",textAlign:"right"}}/>
          <span style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>k</span>
        </div>
      </div>
      <input type="range" min={min} max={max} step={1} value={value}
        aria-label={`${label} Slider`}
        onChange={e=>onChange(Number(e.target.value))}
        style={{accentColor:color,color}}/>

function ModelRuleBadges({rules}) {
  const badges = ruleBadges(rules);
  if(!badges.length) return null;
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
      {badges.map(b=>(
        <span key={b.id} style={{fontFamily:C.mono,fontSize:9,color:C.amber,background:`${C.amber}18`,
          border:`1px solid ${C.amber}44`,borderRadius:4,padding:"2px 6px"}}>{b.label}</span>
      ))}
    </div>
  );
}

function ModelSelect({models, value, onChange, label="Model"}) {
  return (
    <div style={{position:"relative"}}>
      <select value={value} aria-label={label} onChange={e=>onChange(e.target.value)}
        style={{width:"100%",background:C.s3,border:`1px solid ${C.border2}`,
          borderRadius:5,color:C.text,fontFamily:C.sans,fontSize:13,padding:"9px 30px 9px 10px"}}>
        {models.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
      </select>
      <div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:C.muted,pointerEvents:"none"}}>▾</div>
    </div>
  );
}

function StatCard({label, value, sub, color, big}) {
  return (
    <div style={{background:C.s2,borderRadius:8,padding:"11px 12px",border:`1px solid ${C.border}`}}>
      <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{label}</div>
      <div style={{fontFamily:C.mono,fontWeight:big?700:600,fontSize:big?18:14,color,lineHeight:1.2}}>{value}</div>
      {sub && <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginTop:3}}>{sub}</div>}
    </div>
  );
}

function ActionButton({children, onClick, disabled, tone="default", icon}) {
  const isPrimary = tone === "primary";
  const isDanger = tone === "danger";
  const color = isPrimary ? C.teal : isDanger ? C.red : C.text;
  const border = isPrimary ? C.teal : isDanger ? `${C.red}66` : C.border2;
  return (
    <button onClick={onClick} disabled={disabled}
      style={{background:isPrimary?`linear-gradient(135deg,${C.teal}26,${C.blue}18)`:isDanger?`${C.red}18`:C.s3,
        border:`1px solid ${border}`,borderRadius:9,color,
        minHeight:54,fontWeight:800,fontSize:12,padding:"11px 12px",textAlign:"left",
        display:"flex",alignItems:"center",gap:10,
        boxShadow:isPrimary?`0 0 0 1px ${C.teal}11 inset`:`0 0 0 1px rgba(255,255,255,0.02) inset`}}>
      {icon && <span style={{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",
        background:isPrimary?`${C.teal}18`:isDanger?`${C.red}18`:C.s2,color,fontSize:15,flexShrink:0}}>{icon}</span>}
      <span style={{display:"flex",flexDirection:"column",gap:3,minWidth:0}}>{children}</span>
    </button>
  );
}

function App() {
  const initial = loadConfig();
  const [steps,    setSteps]    = useState(initial.steps);
  const [models,   setModels]   = useState(initial.models);
  const [activeModelIds,setActiveModelIds]=useState(initial.activeModelIds);
  const [sessions, setSessions] = useState(initial.sessions);
  const [cModelId, setCModelId] = useState(initial.cModelId);
  const [rModelId, setRModelId] = useState(initial.rModelId);
  const [revInK,   setRevInK]   = useState(initial.revInK);
  const [revCacheReadK,setRevCacheReadK]= useState(initial.revCacheReadK);
  const [revCacheWriteK,setRevCacheWriteK]= useState(initial.revCacheWriteK);
  const [revOutK,  setRevOutK]  = useState(initial.revOutK);
  const [usagePool,setUsagePool]= useState(initial.usagePool);
  const [maxMode,setMaxMode]= useState(initial.maxMode);
  const [sessionFastMode,setSessionFastMode]= useState(initial.sessionFastMode);
  const [fastModeByModelId,setFastModeByModelId]= useState(initial.fastModeByModelId);
  const [catalogAutoPool,setCatalogAutoPool]= useState(DEFAULT_AUTO_POOL);
  const [catalogUpdatedAt,setCatalogUpdatedAt]= useState("");
  const [reviewEvery,setReviewEvery]=useState(initial.reviewEvery);
  const [currency, setCurrency] = useState(initial.currency);
  const [planBudgets, setPlanBudgets] = useState(initial.planBudgets);
  const [addOpen,  setAddOpen]  = useState(false);
  const [draft,    setDraft]    = useState({name:"",inputP:1.00,cacheP:0.10,cacheWriteP:0,outputP:5.00,color:"#c084fc"});
  const [tab,      setTab]      = useState("steps");
  const [shareUrl, setShareUrl] = useState("");
  const [previousSteps, setPreviousSteps] = useState(null);
  const [saveNotice, setSaveNotice] = useState("");
  const [pricingStatus, setPricingStatus] = useState("Loading Cursor model catalog...");
  const importRef = useRef(null);

  const sesInK  = steps.reduce((s,x)=>s+x.inputK, 0);
  const sesCacheReadK = steps.reduce((s,x)=>s+(x.cacheReadK||0), 0);
  const sesCacheWriteK = steps.reduce((s,x)=>s+(x.cacheWriteK||0), 0);
  const sesOutK = steps.reduce((s,x)=>s+x.outputK, 0);
  const totInK  = sessions * sesInK;
  const totCacheReadK = sessions * sesCacheReadK;
  const totCacheWriteK = sessions * sesCacheWriteK;
  const totOutK = sessions * sesOutK;
  const customModels = models.filter(isCustomModel);
  const activeModels = models.filter(m=>!isPlaceholderModel(m) && (activeModelIds.includes(m.id) || isCustomModel(m)));
  const getModelsForSelectValue = value => {
    const active = activeModels.length ? activeModels : models.filter(m=>!isPlaceholderModel(m)).slice(0,1);
    return active.some(m=>m.id===value) ? active : [models.find(m=>m.id===value),...active].filter(Boolean);
  };
  const cModel  = activeModels.find(m=>m.id===cModelId) || activeModels[0] || models.find(m=>!isPlaceholderModel(m)) || models[0];
  const rModel  = activeModels.find(m=>m.id===rModelId) || cModel;
  const modelForStep = step => activeModels.find(m=>m.id===(step.modelId||cModelId)) || cModel;
  const selectedStepModels = steps.map(modelForStep);
  const uniqueStepModelNames = [...new Set(selectedStepModels.map(m=>m.name))];
  const sessionModelLabel = uniqueStepModelNames.length===1 ? uniqueStepModelNames[0] : "mixed models";
  const reviewEnabled = reviewEvery > 0;
  const reviewCount = reviewEnabled ? Math.ceil(sessions / reviewEvery) : 0;
  const sesCost = steps.reduce((sum,step)=>sum+stepCost(step,modelForStep(step),usagePool,catalogAutoPool,maxMode,sessionFastMode,fastModeByModelId),0);
  const totCost = sessions * sesCost;
  const oneRevCost = pricingResult(rModel,revInK,revCacheReadK,revCacheWriteK,revOutK,usagePool,catalogAutoPool,maxMode,sessionFastMode,fastModeByModelId).cost;
  const revCost = reviewCount * oneRevCost;
  const grand   = totCost + revCost;
  const totalSessions = sessions + reviewCount;
  const aggregateInK = totInK + (reviewCount * revInK);
  const aggregateCacheReadK = totCacheReadK + (reviewCount * revCacheReadK);
  const aggregateCacheWriteK = totCacheWriteK + (reviewCount * revCacheWriteK);
  const aggregateOutK = totOutK + (reviewCount * revOutK);
  const poolLabel = usagePool === "auto" ? "Auto + Composer" : "API (per model)";
  const pct     = n => grand ? Math.min(n/grand*100,100).toFixed(0)+"%" : "0%";
  const money   = n => fmtMoney(n, currency);
  const persistedActiveModelIds = [...new Set([...activeModelIds,...customModels.map(m=>m.id)])];
  const cfg = {steps,models,activeModelIds:persistedActiveModelIds,sessions,cModelId,rModelId,revInK,revCacheReadK,revCacheWriteK,revOutK,reviewEvery,usagePool,maxMode,sessionFastMode,fastModeByModelId,currency,planBudgets};
  const cursorCatalogModels = models.filter(isCursorModel);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  }, [steps,models,persistedActiveModelIds,sessions,cModelId,rModelId,revInK,revCacheReadK,revCacheWriteK,revOutK,reviewEvery,usagePool,maxMode,sessionFastMode,fastModeByModelId,currency,planBudgets]);

  useEffect(() => {
    let ignore = false;
    setPricingStatus("Loading Cursor model catalog...");
    fetch(CURSOR_CATALOG_URL, {cache:"no-store"})
      .then(r => r.ok ? r.json() : Promise.reject(new Error(`Failed to fetch model catalog from ${CURSOR_CATALOG_URL}: HTTP ${r.status}; using stored prices`)))
      .then(payload => {
        if(ignore) return;
        const cursorModels = parseCatalogModels(payload);
        if(!cursorModels.length) {
          setPricingStatus("Model catalog loaded, but no models were found. Using stored prices.");
          return;
        }
        setModels(ms=>{
          const hadPlaceholder = ms.some(isPlaceholderModel);
          const existingCursorModels = ms.filter(isCursorModel);
          const hadSmallCursorFallback = existingCursorModels.length > 0 && existingCursorModels.length < MIN_EXPECTED_CURSOR_MODELS;
          const next = mergeCursorModels(ms, activeModelIds, cursorModels);
          const firstAvailable = next.find(m=>!isPlaceholderModel(m));
          setActiveModelIds(ids=>{
            const existing = new Set(ids.filter(id=>next.some(m=>m.id===id && !isPlaceholderModel(m))));
            if(hadPlaceholder || hadSmallCursorFallback) next.filter(isCursorModel).forEach(m=>existing.add(m.id));
            next.filter(isCustomModel).forEach(m=>existing.add(m.id));
            if(!existing.size && firstAvailable) existing.add(firstAvailable.id);
            return [...existing];
          });
          setCModelId(id=>next.some(m=>m.id===id && !isPlaceholderModel(m)) ? id : firstAvailable?.id || id);
          setRModelId(id=>next.some(m=>m.id===id && !isPlaceholderModel(m)) ? id : firstAvailable?.id || id);
          setSteps(ss=>ss.map(step=>{
            if(next.some(m=>m.id===step.modelId && !isPlaceholderModel(m))) return step;
            return {...step,modelId:firstAvailable?.id || step.modelId};
          }));
          return next;
        });
        if(payload?.autoPool) setCatalogAutoPool(payload.autoPool);
        const updatedAt = payload && typeof payload.updatedAt === "string" ? new Date(payload.updatedAt) : null;
        if(updatedAt && !isNaN(updatedAt)) setCatalogUpdatedAt(updatedAt.toISOString().slice(0,10));
        const stamp = updatedAt && !isNaN(updatedAt) ? ` (catalog ${updatedAt.toISOString().slice(0,10)})` : "";
        setPricingStatus(
          `Loaded ${cursorModels.length} API models + standard custom (Gemini 3.5 Flash)${stamp}. Pool: ${poolLabel}.`
        );
      })
      .catch(err => {
        setPricingStatus("Using stored prices; Cursor model catalog could not be loaded.");
        console.info("Cursor catalog refresh skipped:", err.message);
      });
    return () => { ignore = true; };
  }, []);

  const updStep  = (id,f,v) => setSteps(ss=>ss.map(s=>s.id!==id?s:{...s,[f]:v}));
  const addStep  = () => setSteps(ss=>[...ss,{id:uid("s"),name:"New Step",inputK:25,cacheReadK:5,cacheWriteK:0,outputK:5,modelId:cModelId}]);
  const delStep  = id => { if(steps.length>1) setSteps(ss=>ss.filter(s=>s.id!==id)); };
  const dupStep  = step => setSteps(ss=>{
    const next = [];
    ss.forEach(s => {
      next.push(s);
      if(s.id===step.id) next.push({...step,id:uid("s"),name:`${step.name} copy`});
    });
    return next;
  });
  const moveStep = (currentIndex,direction) => setSteps(ss=>{
    const targetIndex = currentIndex + direction;
    if(targetIndex<0||targetIndex>=ss.length) return ss;
    const next = [...ss];
    [next[currentIndex],next[targetIndex]]=[next[targetIndex],next[currentIndex]];
    return next;
  });
  const updPlanBudget = (id,value) => setPlanBudgets(bs=>({...bs,[id]:Math.max(0,Number(value)||0)}));
  const applyPreset = preset => {
    setPreviousSteps(steps.map(s=>({...s})));
    setSteps(preset.steps());
  };
  const restorePreviousSteps = () => {
    if(!previousSteps) return;
    setSteps(previousSteps.map(s=>({...s})));
    setPreviousSteps(null);
  };
  const setModelAvailability = (model, available) => {
    if(isCustomModel(model)) return;
    setActiveModelIds(ids=>{
      if(available) return ids.includes(model.id) ? ids : [...ids,model.id];
      const next = ids.filter(id=>id!==model.id);
      const fallback = activeModels.find(m=>m.id!==model.id && !isPlaceholderModel(m)) || models.find(m=>m.id!==model.id && !isPlaceholderModel(m));
      if(!fallback) return ids;
      setSteps(ss=>ss.map(s=>s.modelId===model.id?{...s,modelId:fallback.id}:s));
      if(cModelId===model.id) setCModelId(fallback.id);
      if(rModelId===model.id) setRModelId(fallback.id);
      return next.length ? next : [fallback.id];
    });
  };
  const updModel = (id,f,v) => setModels(ms=>ms.map(m=>m.id===id?{...m,[f]:v}:m));
  const delModel = id => {
    if(STANDARD_CUSTOM_MODEL_IDS.has(id)) return;
    if(models.length<=1) return;
    const next = models.filter(m=>m.id!==id);
    setModels(next);
    setActiveModelIds(ids=>{
      const kept = ids.filter(activeId=>activeId!==id);
      return kept.length ? kept : [next[0]?.id].filter(Boolean);
    });
    const fb = next[0]?.id||"";
    setSteps(ss=>ss.map(s=>s.modelId===id?{...s,modelId:fb}:s));
    if(cModelId===id) setCModelId(fb);
    if(rModelId===id) setRModelId(fb);
  };
  const commitAdd = () => {
    if(!draft.name.trim()) return;
    const id = uid("m");
    setModels(ms=>[...ms,{...draft,id,cacheWriteP:draft.cacheWriteP||0,source:"custom"}]);
    setActiveModelIds(ids=>[...ids,id]);
    setDraft({name:"",inputP:1.00,cacheP:0.10,cacheWriteP:0,outputP:5.00,color:"#c084fc"});
    setAddOpen(false);
  };
  const applyConfig = d => {
    setSteps(d.steps); setModels(d.models); setSessions(d.sessions); setCModelId(d.cModelId); setRModelId(d.rModelId);
    setRevInK(d.revInK); setRevCacheReadK(d.revCacheReadK); setRevCacheWriteK(d.revCacheWriteK); setRevOutK(d.revOutK);
    setReviewEvery(d.reviewEvery); setUsagePool(d.usagePool); setMaxMode(d.maxMode);
    setSessionFastMode(d.sessionFastMode); setFastModeByModelId(d.fastModeByModelId||{}); setCurrency(d.currency);
    setActiveModelIds(d.activeModelIds); setPlanBudgets(d.planBudgets);
    setPreviousSteps(null);
  };
  const restoreFactoryDefaults = () => {
    localStorage.removeItem(USER_DEFAULT_STORAGE_KEY);
    localStorage.removeItem(STORAGE_KEY);
    applyConfig(defaultConfig());
    setSaveNotice("Factory defaults restored.");
  };
  const restoreDefaultSteps = () => {
    setPreviousSteps(cloneSteps(steps));
    setSteps(cloneSteps(DEFAULT_STEPS));
    setSaveNotice("Default workflow steps restored.");
  };
  const resetAll = () => {
    if(!confirm("Reset all settings and the saved default?")) return;
    restoreFactoryDefaults();
  };
  const saveAsDefault = () => {
    localStorage.setItem(USER_DEFAULT_STORAGE_KEY, JSON.stringify(cfg));
    setSaveNotice("Current values saved as the default for new sessions.");
  };
  const loadSavedDefault = () => {
    try {
      const d = readStoredConfig(USER_DEFAULT_STORAGE_KEY);
      if(!d) { setSaveNotice("No custom default has been saved yet."); return; }
      applyConfig(d);
      setSaveNotice("Saved default loaded.");
    } catch(e) { setSaveNotice("Saved default could not be loaded."); }
  };
  const exportConfig = () => {
    const url = URL.createObjectURL(new Blob([JSON.stringify(cfg,null,2)], {type:"application/json"}));
    const a = document.createElement("a"); a.href=url; a.download="cursor-calc-config.json"; a.click(); URL.revokeObjectURL(url);
  };
  const importConfig = e => {
    const file = e.target.files[0]; if(!file) return;
    file.text().then(t => {
      try {
        const d=sanitizeConfig(JSON.parse(t));
        applyConfig(d);
      } catch(err) { alert("Import failed: invalid JSON file"); }
      e.target.value="";
    });
  };
  const shareConfig = async () => {
    const url = `${location.origin}${location.pathname}?config=${encodeConfig(cfg)}`;
    if(url.length>6000) {
      setShareUrl("Configuration is too large for a reliable share link. Please use JSON export.");
      return;
    }
    try { await navigator.clipboard.writeText(url); alert("Share link copied"); }
    catch(e) { setShareUrl(url); }
  };

  const tabs = [
    {id:"steps",   icon:"⬡", label:"Steps"},
    {id:"config",  icon:"⚙", label:"Config"},
    {id:"models",  icon:"◈", label:"Models"},
    {id:"results", icon:"◎", label:"Results"},
  ];

  return (
    <div style={{background:C.bg,minHeight:"100%",display:"flex",flexDirection:"column"}}>

      {/* ── Sticky Header ── */}
      <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,
        padding:"12px 14px",position:"sticky",top:0,zIndex:10,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,flexShrink:0,
            background:`linear-gradient(135deg,${C.teal},${C.blue})`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⬡</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:14,letterSpacing:-0.3}}>Cursor Calc</div>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>
              {sessions} Sessions · {fmtTok(sesInK+sesOutK)}/Session · {sessionModelLabel}
            </div>
          </div>
          <div style={{fontFamily:C.mono,fontWeight:800,fontSize:20,color:C.purple,flexShrink:0}}>
            {money(grand)}
          </div>
        </div>
      </div>

      {/* ── Tab Bar ── */}
      <div style={{display:"flex",background:C.s1,borderBottom:`1px solid ${C.border}`,
        position:"sticky",top:56,zIndex:9,flexShrink:0}}>
        {tabs.map(t=>(
          <button key={t.id} aria-label={`Open ${t.label}`} onClick={()=>setTab(t.id)} style={{
            flex:1,padding:"11px 0",background:"transparent",border:"none",
            borderBottom:tab===t.id?`2px solid ${C.teal}`:`2px solid transparent`,
            color:tab===t.id?C.teal:C.muted,fontWeight:700,fontSize:11,
            display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:14}}>{t.icon}</span>
            <span style={{letterSpacing:0.3}}>{t.label}</span>
          </button>
        ))}
      </div>

      {/* ── Content ── */}
      <div style={{flex:1,overflowY:"auto",padding:12,maxWidth:700,width:"100%",margin:"0 auto"}}>
        <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:8,padding:10,marginBottom:12,
          fontFamily:C.mono,fontSize:11,color:C.muted,lineHeight:1.5}}>
          <div>{pricingStatus}{catalogUpdatedAt ? ` · Catalog ${catalogUpdatedAt}` : ""} · Billing: <span style={{color:C.teal}}>{poolLabel}</span></div>
          <div style={{marginTop:6,color:C.dim,fontSize:10}}>{ESTIMATION_NOTICE}</div>
        </div>

        {/* STEPS */}
        {tab==="steps" && (
          <Panel title="Workflow Steps"
            badge={`${fmtTok(sesInK)} in · ${fmtTok(sesCacheReadK)} cr · ${fmtTok(sesCacheWriteK)} cw · ${fmtTok(sesOutK)} out · ${money(sesCost)}/Session`}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:10,marginBottom:12}}>
              {PRESETS.map(p=>(
                <ActionButton key={p.name} onClick={()=>applyPreset(p)} icon="↯">
                  <span style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>Preset</span>
                  <span>{p.name}</span>
                </ActionButton>
              ))}
              <ActionButton onClick={restorePreviousSteps} disabled={!previousSteps} icon="↶">
                <span style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>Undo</span>
                <span>Restore previous steps</span>
              </ActionButton>
              <ActionButton onClick={restoreFactoryDefaults} tone="primary" icon="↺">
                <span style={{fontFamily:C.mono,fontSize:10,color:C.teal}}>Default</span>
                <span>Restore factory defaults</span>
              </ActionButton>
              <ActionButton onClick={restoreDefaultSteps} icon="↶">
                <span style={{fontFamily:C.mono,fontSize:10,color:C.muted}}>Steps</span>
                <span>Restore default steps</span>
              </ActionButton>
              <ActionButton onClick={saveAsDefault} icon="✓">
                <span style={{fontFamily:C.mono,fontSize:10,color:C.teal}}>Default</span>
                <span>Save current values</span>
              </ActionButton>
            </div>
            {saveNotice && <div style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginBottom:12}}>{saveNotice}</div>}
            {steps.map((step,i)=>(
              <div key={step.id} style={{background:C.s3,borderRadius:8,padding:12,
                border:`1px solid ${C.border}`,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                  <span style={{fontFamily:C.mono,fontSize:11,color:C.muted,
                    background:C.s2,borderRadius:4,padding:"2px 8px",flexShrink:0}}>{i+1}</span>
                  <label style={{flex:1,display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                    <span style={{fontFamily:C.mono,fontSize:10,color:C.muted,flexShrink:0}}>Name</span>
                    <input aria-label={`Name for step ${i+1}`} title="Rename step" value={step.name} onChange={e=>updStep(step.id,"name",e.target.value)}
                      style={{flex:1,background:C.s2,border:`1px solid ${C.border2}`,borderRadius:5,color:C.text,
                        fontFamily:C.sans,fontWeight:700,fontSize:13,outline:"none",minWidth:0,padding:"5px 7px"}}/>
                  </label>
                  <button aria-label={`Move ${step.name} up`} disabled={i===0} onClick={()=>moveStep(i,-1)}
                    style={{background:C.s2,border:`1px solid ${C.border2}`,borderRadius:6,
                      color:C.muted,fontSize:13,padding:"4px 7px",flexShrink:0}}>↑</button>
                  <button aria-label={`Move ${step.name} down`} disabled={i===steps.length-1} onClick={()=>moveStep(i,1)}
                    style={{background:C.s2,border:`1px solid ${C.border2}`,borderRadius:6,
                      color:C.muted,fontSize:13,padding:"4px 7px",flexShrink:0}}>↓</button>
                  <button aria-label={`Duplicate ${step.name}`} onClick={()=>dupStep(step)}
                    style={{background:`${C.blue}22`,border:`1px solid ${C.blue}44`,borderRadius:6,
                      color:C.blue,fontSize:13,padding:"4px 8px",flexShrink:0}}>⧉</button>
                  <button aria-label={`Delete ${step.name}`} disabled={steps.length<=1} onClick={()=>delStep(step.id)}
                    style={{background:`${C.red}22`,border:`1px solid ${C.red}44`,borderRadius:6,
                      color:C.red,fontSize:14,lineHeight:1,padding:"4px 8px",flexShrink:0}}>✕</button>
                </div>
                <div style={{marginBottom:10}}>
                  <Label>Model for this step</Label>
                  <ModelSelect label={`Model for step ${i+1}`} models={getModelsForSelectValue(modelForStep(step).id)} value={modelForStep(step).id} onChange={v=>updStep(step.id,"modelId",v)}/>
                </div>
                <TokSlider label="Input tokens (non-cache)" value={step.inputK} color={C.teal} max={500} min={0}
                  onChange={v=>updStep(step.id,"inputK",v)}/>
                <TokSlider label="Cache read tokens" value={step.cacheReadK||0} color={C.muted} max={500} min={0}
                  onChange={v=>updStep(step.id,"cacheReadK",v)}/>
                <TokSlider label="Cache write tokens" value={step.cacheWriteK||0} color={C.blue} max={500} min={0}
                  onChange={v=>updStep(step.id,"cacheWriteK",v)}/>
                <TokSlider label="Output tokens" value={step.outputK} color={C.amber} max={100}
                  onChange={v=>updStep(step.id,"outputK",v)}/>
                {(() => {
                  const m = modelForStep(step);
                  const meta = stepPricingMeta(step, m, usagePool, catalogAutoPool, maxMode, sessionFastMode, fastModeByModelId);
                  const fastOn = resolveFastMode(m, sessionFastMode, fastModeByModelId);
                  return (
                    <div style={{fontFamily:C.mono,fontSize:11,color:C.blue,marginTop:2}}>

                  {r.label}
                </div>
                <div style={{display:"flex",gap:10,fontFamily:C.mono,fontSize:12}}>
                  <span style={{color:C.teal}}>{fmtTok(r.inK)}</span>
                  <span style={{color:C.muted}}>{fmtTok(r.cacheReadK)}</span>
                  <span style={{color:C.blue}}>{fmtTok(r.cacheWriteK)}</span>
                  <span style={{color:C.amber}}>{fmtTok(r.outK)}</span>
                  <span style={{color:C.text,fontWeight:700}}>{money(r.cost)}</span>
                  <span style={{color:C.muted,minWidth:36,textAlign:"right"}}>{pct(r.cost)}</span>
                </div>
              </div>
            ))}
            <div style={{paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:800,color:C.text}}>∑ Run</span>
              <span style={{fontFamily:C.mono,fontWeight:800,fontSize:18,color:C.purple}}>{money(grand)}</span>
            </div>
          </Panel>

          <Panel title="Step Breakdown">
            {steps.map((s,i)=>(
              <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"9px 10px",background:C.s3,borderRadius:7,border:`1px solid ${C.border}`,marginBottom:7}}>
                <div>
                  <span style={{fontFamily:C.mono,fontSize:10,color:C.muted,marginRight:8}}>{i+1}</span>
                  <span style={{fontWeight:700,fontSize:12}}>{s.name}</span>
                </div>
                <div style={{display:"flex",gap:8,fontFamily:C.mono,fontSize:12}}>
                  <span style={{color:C.teal}}>{fmtTok(s.inputK)}</span>
                  <span style={{color:C.muted}}>{fmtTok(s.cacheReadK||0)}</span>
                  <span style={{color:C.blue}}>{fmtTok(s.cacheWriteK||0)}</span>
                  <span style={{color:C.amber}}>{fmtTok(s.outputK)}</span>
                  <span style={{color:modelForStep(s).color}}>{modelForStep(s).name}</span>
                  <span style={{color:C.blue}}>{money(stepCost(s,modelForStep(s),usagePool,catalogAutoPool,maxMode,sessionFastMode,fastModeByModelId))}</span>
                </div>
              </div>
            ))}
          </Panel>

          <Panel title="Plan Coverage / Month">
            {PLANS.map(plan=>{
              const budget=planBudgets[plan.id] || 0;
              const cycles=budget>0?Math.floor(budget/grand):0;
              const barPct=budget>0?Math.min((grand/budget)*100,100):0;
              const ok=budget>0 && grand<=budget;
              return (
                <div key={plan.id} style={{background:C.s3,borderRadius:8,padding:"12px 13px",
                  border:`1px solid ${ok?C.teal+"44":C.border}`,marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
                    <span style={{fontWeight:800,fontSize:13}}>{plan.name}</span>
                    <span style={{fontFamily:C.mono,fontSize:12,color:C.muted}}>{budget?`${money(budget)}/mo`:"No budget set"}</span>
                  </div>
                  <div style={{height:6,background:C.border,borderRadius:3,marginBottom:9,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${barPct}%`,
                      background:ok?C.green:C.red,borderRadius:3,transition:"width 0.3s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                    <span style={{fontFamily:C.mono,fontWeight:700,color:ok?C.green:C.red}}>
                      {budget?`~${cycles}× runs/mo`:"No coverage calculated"}
                    </span>
                    <span style={{fontFamily:C.mono,color:C.muted}}>
                      {budget?`${Math.min(barPct,100).toFixed(0)}% used`:"Set a budget in Config"}
                    </span>
                  </div>
                </div>
              );
            })}
          </Panel>
        </>)}

        <div style={{height:80}}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
