name: Update Cursor models

on:
  schedule:
    # Daily at 06:17 UTC. Cursor doesn't change prices that often, but a
    # daily refresh keeps the catalog within ~24h of the published page.
    - cron: '17 6 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/update-models.mjs'
      - '.github/workflows/update-models.yml'

permissions:
  contents: write

concurrency:
  group: update-cursor-models
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape Cursor pricing page
        run: node scripts/update-models.mjs

      - name: Commit refreshed catalog
        run: |
          if git diff --quiet -- models.json; then
            echo "No model changes; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models.json
          git commit -m "chore: refresh Cursor model catalog"
          git push
